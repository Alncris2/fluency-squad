issue_body: |
  ## Contexto
  Configurar docker-compose.yml com serviços: laravel-api, angular-app, postgres, redis. Hot reload em ambos.

  ## Critérios de aceite
  - [ ] `docker compose up` sobe backend + frontend + PostgreSQL + Redis
  - [ ] Laravel responde em :8000, Angular em :4200
  - [ ] CORS configurado para comunicação entre os dois
  - [ ] Variáveis de ambiente documentadas no .env.example
  - [ ] README com instruções de setup local completas

  ## Dependências
  Nenhuma — card inicial do projeto.

