name: "Pipeline - Fluency Dev"
version: "1.0.0"
created: "2026-04-04"
squad: "fluency-dev"

description: >
  Pipeline principal de desenvolvimento com leitura de backlog, planejamento,
  implementacao backend/frontend, QA, checkpoint humano e documentacao.

mode: "development"

steps:
  - id: step-01
    name: "Backlog Reader"
    type: agent
    agent: orchestrator
    file: steps/01-backlog-reader.md

  - id: step-02
    name: "PM Stories"
    type: agent
    agent: pm
    file: steps/02-pm-stories.md
    depends_on: step-01

  - id: step-03
    name: "Checkpoint Stories"
    type: checkpoint
    file: steps/03-checkpoint-approve-stories.md
    depends_on: step-02

  - id: step-04
    name: "Dev Backend"
    type: agent
    agent: dev-backend
    file: steps/04-dev-backend.md
    depends_on: step-03

  - id: step-05
    name: "Dev Frontend"
    type: agent
    agent: dev-frontend
    file: steps/05-dev-frontend.md
    depends_on: step-03

  - id: step-06
    name: "QA Tests"
    type: agent
    agent: qa
    file: steps/06-qa-tests.md
    depends_on:
      - step-04
      - step-05

  - id: step-07
    name: "Checkpoint Code"
    type: checkpoint
    file: steps/07-checkpoint-approve-code.md
    depends_on: step-06

  - id: step-08
    name: "Docs Writer"
    type: agent
    agent: docs
    file: steps/08-docs-writer.md
    depends_on: step-07

checkpoints:
  - step-03
  - step-07

output:
  artifacts:
    - output/task-brief.yaml
    - output/stories.md
    - output/backend-changes.md
    - output/frontend-changes.md
    - output/change-manifest.json
    - output/qa-report.md
    - output/docs-report.md
